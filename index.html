<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101810" />
  <title>SPM Integrated Command Center</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101810;
      --panel: rgba(17, 24, 17, 0.96);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --line: rgba(255, 153, 51, 0.18);
      --line-strong: rgba(255, 153, 51, 0.42);
      --green: #2fe08c;
      --orange: #ffb86b;
      --text: #f0f7ef;
      --muted: rgba(240, 247, 239, 0.68);
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      min-width: 320px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(47, 224, 140, 0.12), transparent 32%),
        linear-gradient(225deg, rgba(255, 184, 107, 0.16), transparent 34%),
        linear-gradient(180deg, #142014, #0f150f 58%, #0b100c);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      height: 100dvh;
      min-height: 100svh;
      padding: calc(8px + var(--safe-top)) 8px 8px;
    }

    .topbar,
    .viewer,
    .modebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.15;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button,
    .mode-link,
    .icon-button {
      appearance: none;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      font: inherit;
      font-weight: 800;
      color: var(--text);
      background: var(--panel-soft);
      cursor: pointer;
      touch-action: manipulation;
    }

    .icon-button {
      display: inline-grid;
      width: 44px;
      place-items: center;
      text-decoration: none;
    }

    .icon-button:focus-visible,
    .mode-link:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 2px;
    }

    .viewer {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #091009;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #091009;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(9, 16, 9, 0.78);
      color: var(--muted);
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .viewer.is-loading .loader {
      opacity: 1;
    }

    .modebar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      order: -1;
    }

    .mode-link {
      display: grid;
      gap: 1px;
      justify-items: center;
      align-content: center;
      min-width: 0;
      min-height: 40px;
      padding: 7px 8px;
      line-height: 1.1;
      text-decoration: none;
    }

    .mode-link span {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .mode-link small {
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
    }

    .mode-link.active {
      border-color: var(--line-strong);
      background: rgba(255, 184, 107, 0.15);
      color: #ffe1bf;
    }

    .mode-link.active small {
      color: var(--orange);
    }

    @media (min-width: 700px) {
      .app {
        grid-template-rows: auto minmax(0, 1fr);
        grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
        padding: calc(8px + var(--safe-top)) 8px 8px;
      }

      .topbar {
        grid-column: 2;
        grid-row: 1;
        padding: 8px 10px;
      }

      .brand-title {
        font-size: 15px;
      }

      .brand-subtitle {
        font-size: 12px;
      }

      .modebar {
        grid-column: 1;
        grid-row: 1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .viewer {
        grid-column: 1 / -1;
        grid-row: 2;
      }
    }

    @media (max-width: 699px) {
      .app {
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 8px;
        padding: calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom));
      }

      .topbar {
        border-radius: 12px;
      }

      .viewer {
        border-radius: 10px;
      }

      .modebar {
        z-index: 5;
        border-radius: 14px;
      }
    }

    @media (max-width: 380px) {
      .brand-title {
        font-size: 13px;
      }

      .brand-subtitle {
        display: none;
      }

      .mode-link span {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="modebar" aria-label="Analysis mode">
      <a id="singleBtn" class="mode-link active" href="SPM_Malda_Division.html" aria-current="page">
        <span>Single Analysis</span>
        <small>Option A</small>
      </a>
      <a id="bulkBtn" class="mode-link" href="SPM_FINAL_SINGLE_FILE.html">
        <span>Bulk Analysis</span>
        <small>Option B</small>
      </a>
    </nav>

    <header class="topbar" aria-label="SPM Command Center">
      <div class="brand">
        <h1 class="brand-title">SPM Analysis - Malda Division</h1>
        <p class="brand-subtitle">Integrated command center by Iman Biswas</p>
      </div>
      <div class="actions">
        <button class="icon-button" id="refreshBtn" type="button" aria-label="Reload analysis" title="Reload">&#8635;</button>
        <a class="icon-button" id="openBtn" href="SPM_Malda_Division.html" target="_blank" rel="noopener" aria-label="Open current analysis in full screen" title="Open full screen">&#8599;</a>
      </div>
    </header>

    <main class="viewer is-loading" id="viewer">
      <iframe id="workspaceFrame" src="about:blank" title="SPM Analysis Workspace"></iframe>
      <div class="loader" id="loader">Loading analysis...</div>
    </main>
  </div>

  <script>
    const frame = document.getElementById('workspaceFrame');
    const viewer = document.getElementById('viewer');
    const singleBtn = document.getElementById('singleBtn');
    const bulkBtn = document.getElementById('bulkBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const openBtn = document.getElementById('openBtn');

    const docs = {
      single: 'SPM_Malda_Division.html',
      bulk: 'SPM_FINAL_SINGLE_FILE.html'
    };

    let activeMode = 'single';

    function setLoading(isLoading) {
      viewer.classList.toggle('is-loading', isLoading);
    }

    function openMode(mode) {
      activeMode = mode;
      const src = docs[mode];

      singleBtn.classList.toggle('active', mode === 'single');
      bulkBtn.classList.toggle('active', mode === 'bulk');
      singleBtn.toggleAttribute('aria-current', mode === 'single');
      bulkBtn.toggleAttribute('aria-current', mode === 'bulk');
      openBtn.href = src;

      setLoading(true);
      if (frame.getAttribute('src') === src) {
        frame.contentWindow.location.reload();
      } else {
        frame.src = src;
      }
    }

    singleBtn.addEventListener('click', (event) => {
      event.preventDefault();
      openMode('single');
      history.replaceState(null, '', '#single');
    });
    bulkBtn.addEventListener('click', (event) => {
      event.preventDefault();
      openMode('bulk');
      history.replaceState(null, '', '#bulk');
    });
    refreshBtn.addEventListener('click', () => openMode(activeMode));
    frame.addEventListener('load', () => setLoading(false));

    openMode(location.hash === '#bulk' ? 'bulk' : 'single');
  </script>
</body>
</html>
